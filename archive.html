<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📂 档案室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #c0c0c0;
            font-family: "Courier New", "SimSun", monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: 
                radial-gradient(ellipse at 50% 50%, rgba(20,20,20,0.8) 0%, #0a0a0a 100%);
            cursor: crosshair;
        }

        .archive-container {
            max-width: 700px;
            width: 90%;
            padding: 40px;
            background: #111111;
            border: 1px solid #333;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        .archive-header h1 {
            font-size: 22px;
            color: #666;
            letter-spacing: 3px;
            margin-bottom: 6px;
            font-family: "SimHei", "黑体", monospace;
        }

        .archive-header .subtitle {
            font-size: 11px;
            color: #444;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .archive-body {
            padding: 30px 0;
            color: #555;
            font-size: 13px;
            letter-spacing: 1px;
            line-height: 2;
        }

        .archive-footer {
            padding-top: 20px;
            border-top: 1px solid #222;
        }

        .archive-footer a {
            color: #444;
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 2px;
            transition: color 0.3s;
        }

        .archive-footer a:hover {
            color: #8b0000;
        }

        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.1) 2px,
                rgba(0,0,0,0.1) 4px
            );
        }
    </style>
</head>
<body>
    <div class="scanline"></div>

    <div class="archive-container">
        <div class="archive-header">
            <h1>📂 档案室</h1>
            <div class="subtitle">ARCHIVE</div>
        </div>

        <div class="archive-body">
            <p>暂时到此为止吧...我只做了这些:|</p>
        </div>

        <div class="archive-footer">
            <a href="secret.html">← 返回</a>
        </div>
    </div>
</body>
</html>
