<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📂 聊天室？</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #c0c0c0;
            font-family: "Courier New", "SimSun", monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: 
                radial-gradient(ellipse at 50% 50%, rgba(20,20,20,0.8) 0%, #0a0a0a 100%);
            cursor: crosshair;
        }

        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.08) 2px,
                rgba(0,0,0,0.08) 4px
            );
        }

        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9998;
            opacity: 0.02;
        }

        .chat-container {
            max-width: 650px;
            width: 92%;
            height: 85vh;
            max-height: 700px;
            background: #111111;
            border: 1px solid #333;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10000;
        }

        /* 顶部标题栏 */
        .chat-header {
            padding: 12px 20px;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0d0d0d;
            flex-shrink: 0;
        }

        .chat-header .title {
            font-size: 13px;
            color: #8b0000;
            letter-spacing: 2px;
            font-family: "SimHei", "黑体", monospace;
        }

        .chat-header .status {
            font-size: 10px;
            color: #2a5a2a;
            letter-spacing: 1px;
        }

        .chat-header .status::before {
            content: '● ';
            color: #2a5a2a;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .chat-header a {
            color: #444;
            text-decoration: none;
            font-size: 11px;
            letter-spacing: 1px;
        }

        .chat-header a:hover {
            color: #8b0000;
        }

        /* 消息区域 */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 2px;
        }

        /* 对方消息 */
        .message-other {
            display: flex;
            gap: 8px;
            align-items: flex-start;
        }

        .message-other .avatar {
            width: 28px;
            height: 28px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .message-other .bubble {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 0 6px 6px 6px;
            padding: 8px 12px;
            max-width: 75%;
            font-size: 12px;
            line-height: 1.7;
            color: #aaa;
            letter-spacing: 0.5px;
            word-wrap: break-word;
        }

        .message-other .time {
            font-size: 9px;
            color: #444;
            margin-top: 3px;
        }

        /* 自己消息 */
        .message-self {
            display: flex;
            gap: 8px;
            align-items: flex-start;
            flex-direction: row-reverse;
        }

        .message-self .avatar {
            width: 28px;
            height: 28px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .message-self .bubble {
            background: #0d1a0d;
            border: 1px solid #1a3a1a;
            border-radius: 6px 0 6px 6px;
            padding: 8px 12px;
            max-width: 75%;
            font-size: 12px;
            line-height: 1.7;
            color: #8a9a8a;
            letter-spacing: 0.5px;
            word-wrap: break-word;
        }

        .message-self .time {
            font-size: 9px;
            color: #444;
            margin-top: 3px;
            text-align: right;
        }

        /* 系统消息 */
        .message-system {
            text-align: center;
            font-size: 10px;
            color: #444;
            letter-spacing: 1px;
            padding: 4px 0;
        }

        /* 输入区域 */
        .chat-input {
            padding: 12px 16px;
            border-top: 1px solid #222;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
        }

        .chat-input input {
            flex: 1;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 3px;
            padding: 10px 14px;
            color: #aaa;
            font-family: "Courier New", monospace;
            font-size: 12px;
            outline: none;
            letter-spacing: 1px;
        }

        .chat-input input:focus {
            border-color: #555;
        }

        .chat-input input::placeholder {
            color: #333;
        }

        .chat-input button {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #666;
            padding: 10px 16px;
            border-radius: 3px;
            cursor: pointer;
            font-family: "SimHei", "黑体", monospace;
            font-size: 12px;
            letter-spacing: 2px;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .chat-input button:hover {
            background: #222;
            color: #8b0000;
            border-color: #8b0000;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .chat-container {
                height: 90vh;
                width: 96%;
            }
            
            .bubble {
                max-width: 85% !important;
                font-size: 11px !important;
            }
        }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <div class="noise"></div>

    <div class="chat-container">
        <!-- 标题栏 -->
        <div class="chat-header">
            <span class="title">📂 #001</span>
            <span class="status">在线</span>
            <a href="secret.html">← 返回</a>
        </div>

        <!-- 消息列表 -->
        <div class="chat-messages" id="chatMessages">
            <div class="message-system">——— 通讯已建立 ———</div>
            
        </div>

        <!-- 输入区域 -->
        <div class="chat-input">
            <input type="text" id="chatInput" placeholder="输入消息..." onkeyup="if(event.key==='Enter')sendMessage()">
            <button onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        // ========== 聊天逻辑 ==========

        // 开场白（页面加载后3秒自动发送）
        const openingLines = [
            '你终于来了...',
            '这里是我留下的聊天室',
            '我是江望舒，那个民俗学家',
            '如果你没有头绪，试着输入“怎么回事”吧'
        ];

        openingLines.forEach((line, i) => {
            setTimeout(() => {
                addMessage('other', line);
            }, 1000 + i * 1500);  // 第1条2秒后，之后每条间隔1.8秒
        });

        // 自动回复规则（你来写内容）
        const autoReplies = {
            '你好': '你好。',
            '你是谁': '我是谁...',
            '这里是什么地方': '这里是我留下的聊天室。',
            '怎么回事':['你读过恸山的那篇帖子了吗？','我被困在那里了，现在只能借助这个论坛里的聊天室与外界沟通','你可以输入关键词，我能给你提供信息；同时论坛上出现的新线索，也要拜托你来分享了'],
            '再见': '一路顺风',
            '咖喱炸鸡蛋包饭': '真的好想吃...',
            '咖喱蛋包饭': '好想吃...',
            'hi': '...',
        };

        // 默认回复（匹配不到时的回复）
        const defaultReply = '...';

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            
            if (!text) return;

            // 添加用户消息
            addMessage('self', text);
            input.value = '';

            // 获取回复
            const replies = getReplies(text);
            
            // 多条回复依次发送
            replies.forEach((reply, i) => {
                setTimeout(() => {
                    addMessage('other', reply);
                }, 800 + i * 1500);  // 第一条0.8秒后，之后每条间隔1.5秒
            });
        }

        function getReplies(text) {
            // 遍历关键词匹配
            for (const [keyword, replies] of Object.entries(autoReplies)) {
                if (text.includes(keyword)) {
                    // 返回数组（单条也转成数组）
                    return Array.isArray(replies) ? replies : [replies];
                }
            }
            return [defaultReply];
        }

        function addMessage(type, text) {
            const messagesDiv = document.getElementById('chatMessages');
            
            const now = new Date();
            const time = now.getHours().toString().padStart(2, '0') + ':' + 
                         now.getMinutes().toString().padStart(2, '0');
            
            if (type === 'self') {
                messagesDiv.innerHTML += `
                    <div class="message-self">
                        <div class="avatar">👤</div>
                        <div>
                            <div class="bubble">${text}</div>
                            <div class="time">${time}</div>
                        </div>
                    </div>`;
            } else {
                messagesDiv.innerHTML += `
                    <div class="message-other">
                        <div class="avatar">🌕</div>
                        <div>
                            <div class="bubble">${text}</div>
                            <div class="time">${time}</div>
                        </div>
                    </div>`;
            }
            
            // 滚动到底部
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // 聚焦输入框
        document.getElementById('chatInput').focus();
    </script>
</body>
</html>
