<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帖子详情</title>
    <link rel="stylesheet" href="style-modern.css" id="css-modern">
    <link rel="stylesheet" href="style-retro.css" id="css-retro" disabled>
</head>
<body>
    <div class="container">
        <header>
            <h1>奇异故事</h1>
            <nav>
                <a href="index.html">返回首页</a>
                <a href="admin.html">管理后台</a>
                <span class="theme-switch" onclick="toggleTheme()" title="切换风格">
                    <span id="themeLabel">复古</span>
                </span>
            </nav>
        </header>

        <div id="postDetail">
            <p style="text-align:center;padding:40px;">正在加载帖子...</p>
        </div>
        
        <!-- 评论区域 -->
        <div id="commentsSection" style="display:none;">
            <div class="comment-form">
                <h3>发表评论</h3>
                <input type="text" id="commentNickname" placeholder="你的昵称（可选）" maxlength="20">
                <textarea id="commentContent" placeholder="写下你的评论..." rows="4" maxlength="1000"></textarea>
                <button onclick="addComment()">发表评论</button>
            </div>
            
            <div class="comments-list" id="commentsList">
                <!-- 评论动态渲染 -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
