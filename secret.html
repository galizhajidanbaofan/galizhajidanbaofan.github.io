<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你误入了未开发区域</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #c0c0c0;
            font-family: "Courier New", "SimSun", monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: 
                radial-gradient(ellipse at 50% 50%, rgba(30,30,30,0.8) 0%, #0a0a0a 100%),
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.01) 2px, rgba(255,255,255,0.01) 4px);
            cursor: crosshair;
        }

        .secret-container {
            max-width: 600px;
            width: 90%;
            padding: 40px;
            background: #111111;
            border: 1px solid #333;
            border-radius: 4px;
            box-shadow: 
                0 0 20px rgba(0,0,0,0.5),
                inset 0 0 20px rgba(0,0,0,0.3);
            position: relative;
        }

        .secret-container::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 20px;
            right: 20px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #444, transparent);
        }

        .secret-container::after {
            content: '';
            position: relative;
            z-index: 10000;
            bottom: -1px;
            left: 20px;
            right: 20px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #444, transparent);
        }

        .secret-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #222;
        }

        .secret-header h1 {
            font-size: 24px;
            color: #8b0000;
            letter-spacing: 4px;
            margin-bottom: 8px;
            text-shadow: 0 0 10px rgba(139,0,0,0.5);
            font-family: "SimHei", "黑体", monospace;
        }

        .secret-header .subtitle {
            font-size: 12px;
            color: #555;
            letter-spacing: 2px;
        }

        .secret-body {
            text-align: center;
            padding: 20px 0;
        }

        .secret-body .icon {
            font-size: 60px;
            margin-bottom: 20px;
            animation: flicker 3s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 0.3; }
        }

        .secret-body p {
            color: #666;
            font-size: 13px;
            line-height: 2;
            letter-spacing: 1px;
        }

        .secret-footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #222;
        }

        .secret-footer a {
            color: #444;
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 2px;
            transition: color 0.3s;
        }

        .secret-footer a:hover {
            color: #8b0000;
            text-shadow: 0 0 8px rgba(139,0,0,0.3);
        }

        /* 扫描线效果 */
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.1) 2px,
                rgba(0,0,0,0.1) 4px
            );
        }

        /* 噪点效果 */
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9998;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 200px 200px;
        }
    </style>
</head>




<body>
    <div class="scanline"></div>
    <div class="noise"></div>

    <div class="secret-container">
        <div class="secret-header">
            
            <div class="subtitle">  </div>
        </div>

        <div class="secret-body">
            <div class="icon" id="folderIcon" style="cursor:pointer;" title="点击打开档案">📁</div>
            
            
        </div>

        <div class="secret-footer">
            <a href="index.html">← 返回</a>
        </div>
    </div>

    <script>
        document.getElementById('folderIcon').addEventListener('click', function() {
            const password = prompt('请输入密码：');
            if (password === '2000') {
                window.location.href = 'archive.html';
            } else if (password !== null) {
                alert('✕ 密码错误');
            }
        });
    </script>

</body>
</html>
